<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DriveStyle Auto Accessories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="Drivestylelogo.png" alt="Website Logo" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-container">
      <img src="Drivestylelogo.png" class="logo" style="display:block; margin:0 auto;" />
      <h1>Login</h1>
      <form id="loginForm">
        <label for="loginTRN">TRN</label>
        <input type="text" id="loginTRN" placeholder="000-000-000" required />
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required />
        <p id="loginMessage" class="message"></p>
        <div class="btn-group">
          <button type="submit" class="btn">Login</button>
          <button type="reset" class="btn secondary">Cancel</button>
        </div>
        <p style="margin-top:10px;"><a href="#" class="inline-link" onclick="resetPassword(); return false;">Reset Password</a></p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <!-- JAVASCRIPT - FIXED TO WORK WITH RegistrationData MULTI-ACCOUNT -->
  <script>
    // MAJOR UPDATE LABEL - login now uses TRN + password and keeps 3-attempt lock across reloads

    let attempts = parseInt(localStorage.getItem("loginAttempts") || "0");

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const trn = document.getElementById("loginTRN").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const message = document.getElementById("loginMessage");

      message.textContent = "";

      if (attempts >= 3) {
        window.location.href = "locked.html";
        return;
      }

      if (!trn || !password) {
        message.style.color = "red";
        message.textContent = "Please fill in all fields.";
        return;
      }

      const trnPattern = /^\d{3}-\d{3}-\d{3}$/;
      if (!trnPattern.test(trn)) {
        message.style.color = "red";
        message.textContent = "Enter a valid TRN in the format 000-000-000.";
        return;
      }

      let registrationData = [];
      const storedData = localStorage.getItem("RegistrationData");
      if (storedData) {
        registrationData = JSON.parse(storedData);
      }

      if (registrationData.length === 0) {
        message.style.color = "red";
        message.textContent = "No account found. Please register first.";
        return;
      }

      let foundUser = null;
      for (let i = 0; i < registrationData.length; i++) {
        const user = registrationData[i];
        if (user.trn === trn && user.password === password) {
          foundUser = user;
          break;
        }
      }

      if (foundUser) {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("currentUserTRN", foundUser.trn);
        localStorage.setItem("currentUserName", foundUser.fullName || "");
        localStorage.setItem("loginAttempts", "0");
        message.classList.add("success");
        message.textContent = "Login successful! Redirecting...";
        setTimeout(function() {
          window.location.href = "products.html";
        }, 1000);
      } else {
        attempts++;
        localStorage.setItem("loginAttempts", String(attempts));
        message.style.color = "red";
        message.textContent = "Invalid TRN or password. Attempt " + attempts + " of 3.";

        if (attempts >= 3) {
          setTimeout(function() {
            window.location.href = "locked.html";
          }, 1000);
        }
      }
    });

    function resetPassword() {
      const trn = prompt("Enter your registered TRN:");
      if (!trn) return;

      const users = JSON.parse(localStorage.getItem("RegistrationData") || "[]");
      const userIndex = users.findIndex(function(user) {
        return user.trn === trn.trim();
      });

      if (userIndex === -1) {
        alert("No account found with that TRN.");
        return;
      }

      const newPassword = prompt("Enter your new password (minimum 8 characters):");
      if (!newPassword || newPassword.length < 8) {
        alert("Password reset cancelled or password too short.");
        return;
      }

      users[userIndex].password = newPassword;
      localStorage.setItem("RegistrationData", JSON.stringify(users));
      alert("Password updated successfully.");
    }
  </script>
</body>
</html>
