<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DriveStyle Auto Accessories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="Drivestylelogo.png" alt="Website Logo" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-container">
      <img src="Drivestylelogo.png" class="logo" style="display:block; margin:0 auto;" />
      <h1>Login</h1>
      <form id="loginForm">
        <label for="loginUsername">Username</label>
        <input type="text" id="loginUsername" required />
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required />
        <p id="loginMessage" class="message"></p>
        <button type="submit" class="btn">Login</button>
        <!-- RESET PASSWORD BUTTON -->
        <button type="button" class="btn" onclick="resetPassword()">
          Reset Password
        </button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <!-- JAVASCRIPT - FIXED TO WORK WITH RegistrationData MULTI-ACCOUNT -->
  <script>
    // Reset attempts every single time the page loads (this stops new accounts from being locked)
    localStorage.setItem("loginAttempts", "0");
    let attempts = 0;

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const username = document.getElementById("loginUsername").value.trim();
      const password = document.getElementById("loginPassword").value.trim();
      const message = document.getElementById("loginMessage");

      message.textContent = "";

      // 🔒 BLOCK AFTER 3 ATTEMPTS ONLY
      if (attempts >= 3) {
        window.location.href = "locked.html";
        return;
      }

      // EMPTY CHECK
      if (!username || !password) {
        message.style.color = "red";
        message.textContent = "Please fill in all fields.";
        return;
      }

      // FIXED: Now searches through all registered users in RegistrationData (so both your first and second account should work).
      // It uses the name field from registration as the "username" for login.
      // Get all registered users from RegistrationData array
      let registrationData = [];
      const storedData = localStorage.getItem("RegistrationData");
      if (storedData) {
        registrationData = JSON.parse(storedData);
      }

      // NO ACCOUNT - check if any users exist in RegistrationData
      if (registrationData.length === 0) {
        message.style.color = "red";
        message.textContent = "No account found. Please register first.";
        return;
      }

      // SUCCESS LOGIN - search through all users in RegistrationData
      let foundUser = null;
      for (let i = 0; i < registrationData.length; i++) {
        const user = registrationData[i];
        // Check both 'name' field (from registration) and 'username' field
        if ((user.name === username || user.username === username) && user.password === password) {
          foundUser = user;
          break;
        }
      }

      if (foundUser) {
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("loginAttempts", "0");
        message.style.color = "green";
        message.textContent = "Login successful! Redirecting...";
        setTimeout(() => {
          window.location.href = "products.html";
        }, 1500);
      } else {
        // FAILED LOGIN - only increase here
        attempts++;
        localStorage.setItem("loginAttempts", attempts);
        message.style.color = "red";
        message.textContent = `Invalid login. Attempt ${attempts}/3`;

        if (attempts >= 3) {
          localStorage.setItem("loginAttempts", "3");
          window.location.href = "locked.html";
        }
      }
    });

    // 🔁 RESET PASSWORD FEATURE - FIXED to update password in RegistrationData
    function resetPassword() {
      const usernameInput = document.getElementById("loginUsername").value.trim();
      
      if (!usernameInput) {
        alert("Please enter your username first before resetting password.");
        return;
      }
      
      const newPassword = prompt(
        "Enter new password (min 8 characters, 1 uppercase letter, 1 number):"
      );
      if (!newPassword) return;
      if (newPassword.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
      }
      if (!/[A-Z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
        alert("Password must include at least one uppercase letter and one number.");
        return;
      }
      
      // Find and update the user in RegistrationData
      let registrationData = [];
      const storedData = localStorage.getItem("RegistrationData");
      if (storedData) {
        registrationData = JSON.parse(storedData);
      }
      
      let userFound = false;
      for (let i = 0; i < registrationData.length; i++) {
        const user = registrationData[i];
        if (user.name === usernameInput || user.username === usernameInput) {
          registrationData[i].password = newPassword;
          userFound = true;
          break;
        }
      }
      
      if (userFound) {
        localStorage.setItem("RegistrationData", JSON.stringify(registrationData));
        localStorage.setItem("loginAttempts", "0");
        alert("Password reset successful!");
      } else {
        alert("Username not found. Please register first.");
      }
    }
  </script>
</body>
</html>
