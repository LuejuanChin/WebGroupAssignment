<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | DriveStyle Auto Accessories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="Drivestylelogo.png" alt="Website Logo" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html" class="active">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-container">
      <img src="Drivestylelogo.png" class="logo" style="display:block; margin:0 auto;" />
      <h1>Login</h1>
      <form id="loginForm">
        <!-- CHANGED: Username changed to Email to match RegistrationData -->
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" required />
        
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" required />
        
        <p id="loginMessage" class="message"></p>
        <button type="submit" class="btn">Login</button>
        
        <!-- RESET PASSWORD BUTTON (kept from original but not recommended) -->
        <button type="button" class="btn" onclick="resetPassword()">
          Reset Password
        </button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <!-- JAVASCRIPT -->
  <script>
    // 🔒 ORIGINAL ATTEMPT COUNTER (kept for reference but no longer forces lock)
    let attempts = parseInt(localStorage.getItem("loginAttempts")) || 0;

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      // CHANGED: Use email instead of username to work with RegistrationData
      const enteredEmail = document.getElementById("loginEmail").value.trim();
      const enteredPassword = document.getElementById("loginPassword").value.trim();
      const message = document.getElementById("loginMessage");

      message.textContent = "";

      // 🔒 BLOCK AFTER 3 ATTEMPTS (kept from original)
      if (attempts >= 3) {
        window.location.href = "locked.html";
        return;
      }

      // EMPTY CHECK (original)
      if (!enteredEmail || !enteredPassword) {
        message.style.color = "red";
        message.textContent = "Please fill in all fields.";
        return;
      }

      // NO ACCOUNT CHECK - UPDATED TO USE REGISTRATIONDATA
      let registrationData = localStorage.getItem("RegistrationData");
      if (!registrationData) {
        message.style.color = "red";
        message.textContent = "No account found. Please register first.";
        return;
      }

      let users = JSON.parse(registrationData);
      let matchedUser = null;

      // NEW: Search through all registered users by email and password
      for (let i = 0; i < users.length; i++) {
        if (users[i].email === enteredEmail && users[i].password === enteredPassword) {
          matchedUser = users[i];
          break;
        }
      }

      // SUCCESS LOGIN - UPDATED
      if (matchedUser) {
        localStorage.setItem("loggedInUser", JSON.stringify(matchedUser));
        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("loginAttempts", "0");

        message.style.color = "green";
        message.textContent = "Login successful! Redirecting...";

        setTimeout(() => {
          window.location.href = "products.html";
        }, 1500);
      } else {
        // FAILED LOGIN (original behavior kept)
        attempts++;
        localStorage.setItem("loginAttempts", attempts);
        message.style.color = "red";
        message.textContent = `Invalid login. Attempt ${attempts}/3`;

        if (attempts >= 3) {
          localStorage.setItem("loginAttempts", "3");
          window.location.href = "locked.html";
        }
      }
    });

    // 🔁 RESET PASSWORD FEATURE (kept from original)
    function resetPassword() {
      const newPassword = prompt(
        "Enter new password (min 8 characters, 1 uppercase letter, 1 number):"
      );
      if (!newPassword) return;
      if (newPassword.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
      }
      if (!/[A-Z]/.test(newPassword) || !/[0-9]/.test(newPassword)) {
        alert("Password must include at least one uppercase letter and one number.");
        return;
      }
      localStorage.setItem("password", newPassword);
      localStorage.setItem("loginAttempts", "0");
      alert("Password reset successful!");
    }
  </script>
</body>
</html>
