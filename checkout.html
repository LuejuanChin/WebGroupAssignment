<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | DriveStyle Auto Accessories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="Drivestylelogo.png" alt="Website Logo" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <main class="checkout-page">
    <section class="page-title">
      <h1>Checkout</h1>
      <p>Enter your shipping details and confirm your purchase.</p>
    </section>

    <section class="checkout-layout">
      <!-- Left Side: Checkout Form -->
      <form id="checkoutForm" class="checkout-form">
        <label for="customerName">Full Name</label>
        <input type="text" id="customerName" name="customerName" required />

        <label for="address">Shipping Address</label>
        <textarea id="address" name="address" rows="4" required></textarea>

        <p id="checkoutMessage" class="message"></p>

        <div class="btn-group">
          <button type="submit" class="btn">Confirm</button>
          <button type="button" class="btn secondary" onclick="window.location.href='cart.html'">Cancel</button>
          <button type="button" id="closeBtn" class="btn secondary" onclick="window.location.href='cart.html'">Close</button>
        </div>
      </form>

      <!-- Right Side: Order Summary (Dynamic) -->
      <aside class="checkout-summary">
        <h2>Order Summary</h2>
        <div id="orderSummary">
          <!-- JavaScript will fill this dynamically -->
        </div>
      </aside>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
