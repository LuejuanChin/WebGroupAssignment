<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="Drivestylelogo.png" alt="Website Logo" class="logo" style="height: 45px; display: none;"> <!-- optional logo image — kept as reference -->
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>

  <main class="form-page">
    <section class="form-container">
      <h1>Create Account</h1>
      <form id="registerForm">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required />

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" required />

        <label for="username">Username</label>
        <input type="text" id="username" required />

        <!-- TRN Field -->
        <label for="trn">TRN</label>
        <input type="text" id="trn" placeholder="000-000-000" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required />

        <p id="registerMessage" class="message"></p>

        <button type="submit" class="btn">Register</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <!-- FIXED JAVASCRIPT: 
       Important Notes:
       This version now searches through all registered users in RegistrationData (so both your first and second account should work).
       It uses the name field from registration as the "username" for login.
       Make sure in your register.html you are saving the user with a name field.
       
       Test it:
       Register Account 1 (e.g. name = "john", password = "123")
       Register Account 2 (e.g. name = "mike", password = "456")
       Try logging back into Account 1
       
       Tell me what happens now. Does it let you log into the first account again?
       
       SOLUTION: Now RegistrationData array stores ALL users. Login page will read from RegistrationData.
       Each user object contains: { username, password, trn, fullName, dob, email }
  -->
  <script>
    (function() {
      // Helper function to get all registered users from localStorage
      // Returns an array of user objects. If none exist, initializes empty array.
      function getRegistrationData() {
        const storedData = localStorage.getItem("RegistrationData");
        if (storedData) {
          try {
            return JSON.parse(storedData);
          } catch(e) {
            console.error("Error parsing RegistrationData", e);
            return [];
          }
        }
        return [];
      }

      // Helper function to save the entire RegistrationData array back to localStorage
      function saveRegistrationData(dataArray) {
        localStorage.setItem("RegistrationData", JSON.stringify(dataArray));
      }

      // Helper to check if username already exists across all registered users
      function isUsernameTaken(username, excludeIndex = -1) {
        const users = getRegistrationData();
        return users.some((user, idx) => idx !== excludeIndex && user.username === username);
      }

      // Helper to check if TRN already exists across all registered users
      function isTrnTaken(trn, excludeIndex = -1) {
        const users = getRegistrationData();
        return users.some((user, idx) => idx !== excludeIndex && user.trn === trn);
      }

      // Handle registration form submission
      document.getElementById("registerForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const fullName = document.getElementById("fullName").value.trim();
        const dob = document.getElementById("dob").value;
        const email = document.getElementById("email").value.trim();
        const username = document.getElementById("username").value.trim();
        const trn = document.getElementById("trn").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const message = document.getElementById("registerMessage");

        message.textContent = "";
        message.style.color = "red"; // default error color

        // Check empty fields
        if (!fullName || !dob || !email || !username || !trn || !password || !confirmPassword) {
          message.textContent = "Please fill in all fields.";
          return;
        }

        // TRN format validation (000-000-000)
        const trnPattern = /^\d{3}-\d{3}-\d{3}$/;
        if (!trnPattern.test(trn)) {
          message.textContent = "TRN must be in the format 000-000-000.";
          return;
        }

        // TRN uniqueness check across ALL registered users (using RegistrationData)
        if (isTrnTaken(trn)) {
          message.textContent = "TRN already registered. Please use a different TRN.";
          return;
        }

        // Password length check (8+ characters)
        if (password.length < 8) {
          message.textContent = "Password must be at least 8 characters long.";
          return;
        }

        // Strong password rule: at least one capital letter and one number
        if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
          message.textContent = "Password must include at least one capital letter and one number.";
          return;
        }

        // Confirm password match
        if (password !== confirmPassword) {
          message.textContent = "Passwords do not match.";
          return;
        }

        // Check username uniqueness across ALL registered users (using RegistrationData)
        if (isUsernameTaken(username)) {
          message.textContent = "Username already exists. Please choose another.";
          return;
        }

        // ========== REGISTRATION SUCCESSFUL ==========
        // Create new user object with all relevant fields
        const newUser = {
          username: username,      // This is the "name" field for login
          password: password,
          trn: trn,
          fullName: fullName,
          dob: dob,
          email: email
        };

        // Get existing RegistrationData array (which may already have multiple users)
        const currentUsers = getRegistrationData();
        
        // Add new user to the array
        currentUsers.push(newUser);
        
        // Save the updated RegistrationData array back to localStorage
        saveRegistrationData(currentUsers);
        
        // Also keep backward compatibility for old login systems if needed,
        // but primary login will now read from RegistrationData.
        // However, to ensure any legacy code still works, we can also set individual keys,
        // BUT the login page must be updated to use RegistrationData.
        // Based on instructions, login.html should read from RegistrationData.
        // We'll also store last registered user for convenience but not required.
        
        // Optional: Store current session flag (not needed but helpful)
        // Clear any old single-user keys to avoid confusion (but don't break anything)
        // We'll leave them for now, but login must prioritize RegistrationData.
        
        message.style.color = "green";
        message.textContent = "Registration successful! Redirecting to login...";

        // Redirect to login page after short delay
        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);
      });
    })();
  </script>

  <!-- ADDITIONAL NOTE FOR LOGIN.HTML:
       The login page must also be updated to read from RegistrationData array.
       Below is a commented template that login.html should use to properly authenticate.
       Make sure your login.html contains logic similar to this:
       
       function authenticateUser() {
         const usernameInput = document.getElementById("username").value.trim();
         const passwordInput = document.getElementById("password").value;
         const usersData = localStorage.getItem("RegistrationData");
         if (!usersData) { showError("No registered users found."); return false; }
         const users = JSON.parse(usersData);
         const foundUser = users.find(user => user.username === usernameInput && user.password === passwordInput);
         if (foundUser) {
           localStorage.setItem("loggedInUser", JSON.stringify(foundUser));
           window.location.href = "index.html";
           return true;
         } else {
           showError("Invalid username or password.");
           return false;
         }
       }
       
       This ensures multiple accounts work perfectly.
  -->
</body>
</html>
