<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | DriveStyle Auto Accessories</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">DriveStyle Auto Accessories</div>
    <img src="../Assets/Drivestylelogo.png" alt="Website Logo" class="logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="products.html">Products</a></li>
        <li><a href="cart.html">Cart</a></li>
        <li><a href="login.html">Login</a></li>
        <li><a href="register.html" class="active">Register</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </nav>
  </header>

  <main class="form-page">
    <section class="form-container">
      <h1>Create Account</h1>
      <form id="registerForm">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" required />

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required />

        <label for="email">Email Address</label>
        <input type="email" id="email" required />

        <label for="username">Username</label>
        <input type="text" id="username" required />

        <!-- TRN Field -->
        <label for="trn">TRN</label>
        <input type="text" id="trn" placeholder="000-000-000" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" required />

        <p id="registerMessage" class="message"></p>

        <button type="submit" class="btn">Register</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 DriveStyle Auto Accessories. All Rights Reserved.</p>
  </footer>

  <!-- JavaScript -->
  <script>
    document.getElementById("registerForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const fullName = document.getElementById("fullName").value.trim();
      const dob = document.getElementById("dob").value;
      const email = document.getElementById("email").value.trim();
      const username = document.getElementById("username").value.trim();
      const trn = document.getElementById("trn").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const message = document.getElementById("registerMessage");

      message.textContent = "";

      // Check empty fields
      if (!fullName || !dob || !email || !username || !trn || !password || !confirmPassword) {
        message.style.color = "red";
        message.textContent = "Please fill in all fields.";
        return;
      }

      // TRN format validation (000-000-000)
      const trnPattern = /^\d{3}-\d{3}-\d{3}$/;
      if (!trnPattern.test(trn)) {
        message.style.color = "red";
        message.textContent = "TRN must be in the format 000-000-000.";
        return;
      }

      // TRN uniqueness check
      const existingTRN = localStorage.getItem("trn");
      if (existingTRN === trn) {
        message.style.color = "red";
        message.textContent = "TRN already registered. Please use a different TRN.";
        return;
      }

      // Password length check (8+ characters)
      if (password.length < 8) {
        message.style.color = "red";
        message.textContent = "Password must be at least 8 characters long.";
        return;
      }

      // Strong password rule
      if (!/[A-Z]/.test(password) || !/[0-9]/.test(password)) {
        message.style.color = "red";
        message.textContent = "Password must include at least one capital letter and one number.";
        return;
      }

      // Confirm password match
      if (password !== confirmPassword) {
        message.style.color = "red";
        message.textContent = "Passwords do not match.";
        return;
      }

      // Check username uniqueness
      const existingUser = localStorage.getItem("username");
      if (existingUser === username) {
        message.style.color = "red";
        message.textContent = "Username already exists. Please choose another.";
        return;
      }

      // Save user data
      localStorage.setItem("username", username);
      localStorage.setItem("password", password);
      localStorage.setItem("trn", trn);

      message.style.color = "green";
      message.textContent = "Registration successful! Redirecting to login...";

      setTimeout(() => {
        window.location.href = "login.html";
      }, 2000);
    });
  </script>

</body>
</html>
